<div class="content">
  <app-header></app-header>
  <main class="relative">
    @if (showGPSModal()) {
      <app-gps-modal (city)="receiveCityData($event)" (showGPSModal)="receiveModalStatus($event)"></app-gps-modal>
    }
    @else {
      <app-search (city)="receiveCityData($event)"></app-search>
    }
    @if (isCurrentLoading()) {
      <div class="flex items-center justify-center h-6/12">
        <mat-spinner [diameter]="50"></mat-spinner>
      </div>
    } 
    @else if (openMeteoApiResponse()) {
      <app-current-weather [data]="openMeteoApiResponse()" [city]="city()"></app-current-weather>
      <app-hourly-weather [data]="openMeteoApiResponse()" [city]="city()"></app-hourly-weather>
      <app-weekly-weather [data]="openMeteoApiResponse()"></app-weekly-weather>
    }
  </main>
  <app-footer></app-footer>
</div>
