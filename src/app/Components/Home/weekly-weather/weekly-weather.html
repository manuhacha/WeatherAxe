      <div class="dailyforecast border border-zinc-600 rounded-xl text-white w-11/12 lg:w-8/12 py-5 my-8 px-8 mx-auto">
        <span class="text-3xl font-medium">Weekly forecast</span>
        <div class="flex gap-4 mt-4 overflow-x-auto pb-5 md:pb-0">
          @for (forecast of dailyWeather(); track $index) {
            <div class="forecast w-full text-center">
              <p class="text-lg">{{ forecast.day }}</p>
              <i class="text-5xl md:text-6xl wi {{ forecast.icon }} mt-6"></i>
              <div class="text-sm md:flex justify-center gap-2 mt-4">
                <p>{{forecast.max_temperature}}ºC</p>
                <p>{{forecast.min_temperature}}ºC</p>
              </div>
            </div>
          }
        </div>
      </div>
