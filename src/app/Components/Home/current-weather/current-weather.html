@if (currentWeather(); as weather) {
      <div
        class="forecast block md:flex justify-between items-center gap-4 border border-zinc-600 rounded-xl text-white w-11/12 lg:w-8/12 py-5 mb-8 px-8 mx-auto"
      >
        <div class="current lg:w-4/12">
          <span class="text-3xl font-medium">Current weather</span>
          <div class="location flex items-center gap-1">
            <fa-icon class="text-xl fa-width-auto" [icon]="faLocationDot" />
            <span class="text-xl">{{ weather.city }}</span>
          </div>
          <p class="text-lg">{{ weather.time}}</p>
        </div>
        <div class="weather mt-4 lg:mt-0 lg:w-8/12">
          <div class="flex gap-3 justify-evenly md:justify-end">
            <div class="flex">
            <i class="text-5xl md:text-7xl wi {{ weather.icon }}"></i>
            <div class="temperature flex">
              <p class="text-5xl md:text-6xl">{{ weather.temperature }}<span class="text-2xl md:text-4xl align-super">ºC</span></p>
            </div>
            </div>
            <div class="temperature2">
              <p class="text-base md:text-xl font-bold text-blue-600">{{ weather.weather }}</p>
              <p class="text-sm md:text-base mt-2">Real feel: {{ weather.apparent_temperature }}ºC</p>
            </div>
          </div>
        </div>
      </div>
}
